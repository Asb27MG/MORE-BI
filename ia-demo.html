<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORE BI - IA Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/ia-demo.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="scan-line"></div>

    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <img src="./img/logo-morebi.png" alt="MORE BI" class="logo-img">
            <span class="logo-text">MORE BI AI</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
            <button class="close-btn" onclick="window.close()" title="Cerrar">×</button>
        </div>
    </header>

    <!-- Wrapper principal -->
    <div class="chat-wrapper">
        <!-- Área de mensajes -->
        <div class="messages-area" id="messagesArea">
            <!-- Pantalla de bienvenida -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="ai-avatar-large">🤖</div>
                <h1 class="welcome-title">MORE BI Assistant</h1>
                <p class="welcome-subtitle">
                    Tu asistente de inteligencia analítica. Hazme preguntas sobre datos, 
                    análisis predictivo o automatización robótica.
                </p>
            </div>
        </div>
    </div>

    <!-- Sugerencias rápidas (sobre el input) -->
    <div class="suggestions-container" id="suggestionsContainer">
        <div class="quick-suggestions" id="suggestions">
            <div class="suggestion-chip" onclick="sendSuggestion('Analiza mis ventas del último trimestre')">
                📊 Ventas Q4
            </div>
            <div class="suggestion-chip" onclick="sendSuggestion('Predice tendencias para el próximo año')">
                🔮 Predicciones
            </div>
            <div class="suggestion-chip" onclick="sendSuggestion('Optimiza mi proceso de manufactura')">
                ⚙️ Optimizar
            </div>
            <div class="suggestion-chip" onclick="sendSuggestion('Genera un reporte de ROI')">
                📈 ROI
            </div>
            <div class="suggestion-chip" onclick="sendSuggestion('Estado de robots activos')">
                🤖 Robots
            </div>
        </div>
    </div>

    <!-- Input Area FIJO -->
    <div class="input-container">
        <div class="input-wrapper">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="Escribe tu consulta analítica..."
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
            >
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>  

    <script src="./js/ia-demo.js"></script>
</body>
</html>
